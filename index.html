<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal - Clima Animado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="big-box">
        <div>
            <input class="input-city" type="text" placeholder="Digite o nome da cidade">
            <button class="button-search" onclick="cliqueiNoBotao()">
                <img src="https://cdn-icons-png.flaticon.com/512/54/54481.png" alt="Buscar">
            </button>
        </div>
        
        <div class="mid-box">
            <div class="city">Tempo em...</div>
            <div class="temp">--°C</div>
            
            <div class="small-box">
                <img class="icon-prevision" src="" alt="Ícone do clima" style="display: none;">
                <div class="text-prevision"></div>
            </div>
            
            <div class="humidity">Umidade: --%</div>
            <div class="wind">Vento: -- km/h</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
