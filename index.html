<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporal - Clima Animado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="big-box">

        <div class="search-box">
            <input
                id="input-city"
                class="input-city"
                type="text"
                placeholder="Buscar cidade..."
                aria-label="Nome da cidade"
                onkeydown="if(event.key==='Enter') cliqueiNoBotao()"
            >
            <button class="button-search" aria-label="Buscar cidade" onclick="cliqueiNoBotao()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
            <button class="button-geo" aria-label="Usar minha localização" onclick="usarGeolocalizacao()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
                    <circle cx="12" cy="12" r="8" stroke-dasharray="2 3"/>
                </svg>
            </button>
        </div>

        <div class="mid-box">
            <div class="city">Temporal</div>
            <div class="country"></div>

            <div class="temp-row">
                <div class="temp">--°</div>
                <div class="small-box">
                    <img class="icon-prevision" src="" alt="Ícone do clima" style="display:none;">
                    <div class="text-prevision">Busque uma cidade</div>
                </div>
            </div>

            <div class="details-row">
                <div class="detail-card">
                    <span class="detail-label">Umidade</span>
                    <span class="detail-value humidity-val">--%</span>
                </div>
                <div class="detail-card">
                    <span class="detail-label">Vento</span>
                    <span class="detail-value wind-val">-- km/h</span>
                </div>
                <div class="detail-card">
                    <span class="detail-label">Sensação</span>
                    <span class="detail-value feels-val">--°</span>
                </div>
            </div>
        </div>

        <div class="forecast-box" style="display:none;">
            <div class="forecast-title">Próximos dias</div>
            <div class="forecast-days"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
