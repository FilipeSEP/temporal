<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Digite o nome da cidade">
            <button id="search-btn">🔍</button>
        </div>
        
        <div class="weather-info">
            <h2 id="city">Tempo em...</h2>
            <div id="temperature">--°C</div>
            
            <div class="weather-detail">
                <img id="weather-icon" src="" alt="icone" style="display: none;">
                <span id="description"></span>
            </div>
            
            <div id="humidity">Umidade: --%</div>
            <div id="wind">Vento: -- km/h</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
